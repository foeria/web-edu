  - generic [ref=f4e31]:
    - generic [ref=f4e32]: 关于我们
    - generic [ref=f4e33]: 济南德泓教育咨询有限公司是由济南市工商局批准成立的正规专业咨询教育机构，主要针对青少年厌学逃课、叛逆、早恋、自控力差、啃老、不懂感恩、自卑自恋、离家出走、人格异常、强迫、抑郁、打架斗殴、暴力倾向、亲情淡漠等常见问题。我们坚持以孩子为中心、以家庭为基础、走进孩子心灵、塑造健全人格为理念，把孩子培养成“五会”（即学会自理自立，学会如何学习，学会团结互助，学会为人处事，学会理解关心父母）“三恩”（即知恩，感恩，报恩）的阳光青少年。聘请国内及省内知名心理学、国学、书法家以及管理经验丰富的教务老师，根据孩子不同情况为每一位孩子制定不同的管理和解决方案，采取综合施教的方法，坚持一把钥匙开一把心锁。
    - link "+查看更多" [ref=f4e34] [cursor=pointer]:
      - /url: /about/
