  - generic [ref=f64e30]:
    - generic [ref=f64e31]: 综合施教
    - generic [ref=f64e35]: 找出问题 精准辅导
    - generic [ref=f64e37]:
      - heading "技能培训" [level=3] [ref=f64e38]
      - generic [ref=f64e39]: 点击:182 时间:2019-08-28 作者:济南德泓教育咨询
      - generic [ref=f64e40]:
        - paragraph [ref=f64e41]:
          - generic [ref=f64e42]: 棋是一种文明的竞技活动，能让大家有公平竞争的意识。对学生的创造力、想像力和意志、忍耐力的形成都有益处。它也是一种有益身心健康的活动，还可以丰富学生的课余生活，培养顽强的毅力和良好的道德情操。如今学棋的人也会越来越多了，特别是孩子几乎都是会下一两种棋的。今天学习啦小编就为大家介绍一下棋类教学的教育功能以及学棋的好处。
        - paragraph [ref=f64e43]: 现在很多的孩子都在学习棋类，而在学习棋类的时候也是非常有助于我们的教育的，下面小编就为大家详细的介绍一下吧!
        - paragraph [ref=f64e46]:
          - generic [ref=f64e47]: 中国是个有着很深文化底蕴的国度，而中国四大传统艺术形式——琴、棋、书、画，犹如中国文明发展进程中的一串璀璨的明珠，让人赏心悦目，修身养性;古代贤君智者无不从中参哲悟理，得到治国做人之道。而作为四大传统艺术形式之一的棋更象征着中华民族智慧和种意志的结晶，是中华民族优秀的传统文化遗产。
        - paragraph [ref=f64e48]:
          - generic [ref=f64e49]: 棋者，奕也。下棋者，艺也。博弈不只是益智类游戏，还影响和陶冶着人们的道德观念、行为准则、审美趣味和思维方式。随着素质教育发展，各学校开设了音乐、书法等课程，而棋类教学也慢慢渗入到学校课堂。下面就棋类活动的教育功能谈谈我个人的看法。
        - paragraph [ref=f64e50]:
          - generic [ref=f64e51]: 一、有利于培养学生的品德
        - paragraph [ref=f64e52]:
          - generic [ref=f64e53]: “棋虽小道，品德为尊”。下棋是一种高尚的竞技娱乐活动，对弈者需要有一定的棋术，但更需要有高贵的棋德，没有棋德的人，是会遭到唾骂的。做为学生，从下棋中学到的第一课便是讲礼仪、尊重对手，团结友善，要诚实守信。而这些都是属于德育范畴。
        - paragraph [ref=f64e54]: 二、学校开展棋类活动可以培养学生心静的能力和认真的思考问题和良好的学习态度
        - paragraph [ref=f64e56]:
          - generic [ref=f64e57]: 学生有好动、浮躁的特点。下棋可以让学生学会把握自我的心态，在优势的情况下不骄不躁，在劣势的情况下沉着冷静，利用对手心态上的弱点反败为胜。这样对学生养成冷静思考的学习习惯很有帮助。
        - paragraph [ref=f64e58]:
          - generic [ref=f64e59]: 三、在学校开展棋类活动有益于加强学生的自信心和培养学生的顽强拼搏的意志品质
        - paragraph [ref=f64e60]:
          - generic [ref=f64e61]: 下棋要赢对手，就必须有强烈的取胜愿望，对自己有充足的信心，而且要赢得一盘棋，肯定会遇到各种困难，比如布局、判断生死棋、定式及官子等方面的困惑，这些会激起学生的斗志，提高学生克服困难,战胜困难的能力。
        - paragraph [ref=f64e62]:
          - generic [ref=f64e63]: 四、棋类活动让学生接受挫折教育，完善和提高学生的心理素质
        - paragraph [ref=f64e64]:
          - generic [ref=f64e65]: 现在的学生在温室中长大，很少经历一些挫折，下棋可以教他们如何正确对待失败。下棋有输有赢，不要把失败看得过重，失败了可以重来，让他们在失败中吸取教训，积累经验，学会在哪跌倒在哪爬起来。这能让学生在今后的人生道路上正确面对挫折，更好地前行。
        - paragraph [ref=f64e66]:
          - generic [ref=f64e67]: 在开展棋类活动让学生接受挫折教育，完善和提高学生的心理素质
        - paragraph [ref=f64e68]:
          - generic [ref=f64e69]: 五、开展棋类活动培养孩子的逻辑推理的思维能力
        - paragraph [ref=f64e70]:
          - generic [ref=f64e71]: 一盘棋，开始的布局很关键，走每一步就要推算出以后的变化，想好对应的招数。棋书有云： “不得贪胜，入界宜缓，攻彼顾我，弃子争先。”在对局中，往往在“中盘”阶段争夺最为激烈，并且决定胜负。要求每个棋手有缜密的大局观，需要细致的去分析形势，懂得取舍。这些能煅练学生逻辑推理的思维能力。
        - paragraph [ref=f64e72]:
          - generic [ref=f64e73]: 六、开展棋类活动能够启迪学生的聪明才智，使其思路开阔，促进学业
        - paragraph [ref=f64e74]:
          - generic [ref=f64e75]: 棋是千变万化的，下棋时要用旁通思维，发散思维，多方位、多角度、多侧面地寻找对策。而这能启发学生的聪明才智，开阔自己的思路，学会举一反三，从不同角度思考问题，这对各学科都是有益的思维方法。
        - paragraph [ref=f64e76]:
          - generic [ref=f64e77]: 七、棋类活动有利于培养棋类运动的后备人才
        - paragraph [ref=f64e78]:
          - generic [ref=f64e79]: 孩子是祖国的希望，人才应从小培养，在学校开展棋类活动可以培养人才，发掘人才，为国家输送好苗子。
        - paragraph [ref=f64e80]:
          - generic [ref=f64e81]: 总之，棋是一种文明的竞技活动，能让大家有公平竞争的意识。对学生的创造力、想像力和意志、忍耐力的形成都有益处。它也是一种有益身心健康的活动，还可以丰富学生的课余生活，培养顽强的毅力和良好的道德情操。由此可见在学校开展棋类活动对个人乃至整个民族和国家，既有积极地现实意义，又有深远影响。
        - paragraph [ref=f64e82]
