    - generic [ref=f67e37]:
      - heading "厌学-孩子厌学原因" [level=3] [ref=f67e38]
      - generic [ref=f67e39]: 点击:114 时间:2019-08-28 作者:济南德泓教育咨询
      - generic [ref=f67e40]:
        - paragraph [ref=f67e41]: 很多家长都非常关心孩子的学习，都希望孩子可以有一个好成绩。但是就目前的教育环境，很多孩子或多或少都有一点厌学情绪，就不完全统计，超过百分之七十的中小学生存在厌学情绪。很多家长不知道要怎么处理孩子厌学的问题，往往都会对孩子进行责骂和管教，但这样只会对孩子造成更多的心理压力，导致孩子更不喜欢学习。
        - paragraph [ref=f67e42]: 众多调查资料表明，厌学症是目前中学生诸多学习心理障碍中最普遍、最具有危险性的问题，是青少年最为常见的心理疾病之一。从心理学角度讲，厌学症是指学生消极对待学习活动的行为反应模式，主要表现为学生对学习认识存在偏差，情感上消极对待学习，行为上主动远离学习。患有厌学症的学生往往学习目的不明确，对学习失去兴趣；不认真听课，不完成作业，怕考试；甚至恨书、恨老师、恨学校，旷课逃学；严重者一提到学习就恶心、．头昏、脾气暴躁甚至歇斯底里。厌学症对青少年的生理，心理健康具有极大的危害性.
        - paragraph [ref=f67e43]:
          - generic [ref=f67e44]: 产生厌学的原因多种多样，家庭教育失误是一个不容忽视的原因。拒绝学习，不是孩子的责任，至少不全是孩子的责任，它需要从父母自身开始修正，一点一滴，然后感染孩子。通过心理疏导和家庭治疗，父母和孩子共同改变，可以让孩子爱上学习。您可以和孩子一起尝试以下的方法：共同进退年龄小的孩子可以把学习知识融入到游戏当中，而年龄大的孩子需要同伴的相互鼓励和促进。在孩子们出现厌学，父母又手足无措时，找同学和朋友来共同帮助，可以起到很好的效果。呵护好奇心父母不要忽视和否定孩子的学习和探索行为，努力用他的眼光去观察世界，跟他一起去惊异、提问、讨论，共同做出结论。肯定评价孩子学习乐器或上兴趣班时，一定要不断地肯定他，让他对自己有信心，再引导他找出其中的不足。不断地鼓励才会使孩子对所需掌握的内容保持强烈的兴趣和学习的欲望，才会越学越好。创造环境愉悦的学习环境能够使孩子心情愉快地投入学习，取得良好效果。走出户外带孩子进入大自然能开阔眼界，丰富知识，提高学习兴趣。最好还能指导参加一些实践，如让他自己收集种子、搞发芽的实验等，并鼓励他阅读有关书籍，学会发现问题，提出问题，学会到书中找答案。这样孩子的兴趣广泛，知识面扩大了，学习能力会自然而然地提高。
        - paragraph [ref=f67e45]: 孩子出现厌学情绪的原因有哪些？
        - paragraph [ref=f67e46]: 1、家长实行高压政策，强迫孩子进行学习，总是给孩子灌输学习的重要性。但好玩是孩子的天性，家长总是压抑孩子的天性，容易引起孩子的反感，会让孩子觉得学习是一种负担，从而产生厌学情绪。
        - paragraph [ref=f67e47]: 2、家长溺爱孩子，总是替孩子解决学习上的问题，从而影响孩子学习能力的培养。孩子缺乏学习能力，做不到独立自主学习，从而难以对学习产生兴趣。
        - paragraph [ref=f67e48]: 3、家长对孩子期望过高，总是给孩子报各种补习班，控制孩子的玩乐行为，给孩子添加了很多额外的学习负担，从而导致孩子讨厌学习。
        - paragraph [ref=f67e49]
        - paragraph [ref=f67e51]: 应对方法
        - paragraph [ref=f67e52]: 一是:作为学生来说，要调整好心态，要有自信心，要以坚毅的性格、乐观的处世态度为学处世，坚信付出必有收获。
        - paragraph [ref=f67e53]: 二是:从学校方面来说，要确立学生的主体地位，要了解学生、研究学生，挖掘学生的“闪光点”，在发现学生潜能的基础上提出合理的要求，激发他们获取成功的愿望。至于教师，要努力增强自身素质、提高上课水平，为学生的学习提供良好的条件和支撑。
        - paragraph [ref=f67e54]: 三是:家长也要改变育子观念，要多和孩子沟通交流，要正确估价孩子实力，要注意孩子的性格养成，不给孩子规定不切实际的目标，同时注意查问题、不迁就，有情况要马上找心理医生对孩子进行心理干预和治疗，否则，可能会导致孩子的心理症状加重。
        - paragraph [ref=f67e55]: 家长要怎样才能从根本上解决孩子厌学的问题呢？
        - paragraph [ref=f67e56]: 1、鼓励和支持孩子
        - paragraph [ref=f67e57]: 孩子之所以会有厌学情绪，很大程度上是因为自己的努力没有得到相应的成果，从而失去信心，对学习不再有热情。因此，家长要经常鼓励孩子，培养孩子对学习的信心，帮助孩子端正学习态度，从而激发孩子对学习的热情，消除孩子的厌学情绪。
        - paragraph [ref=f67e58]: 2、让孩子感受学习的乐趣
        - paragraph [ref=f67e59]: 好玩是孩子的天性，家长压抑孩子天性的行为自然会引起孩子的反感，如果能让孩子在学习中感受到乐趣，自然就可以消除孩子的厌学情绪。因此，家长可以寓教于乐，采用多元化学习的形式，让孩子在学习中获得快乐，引导孩子爱上学习。
        - paragraph [ref=f67e60]: 3、不强迫孩子学习
        - paragraph [ref=f67e61]: 父母总是希望孩子能够成才，从而会强迫孩子学习，但这样容易引起孩子的反感，导致孩子出现厌学情绪。因此，家长不要强迫孩子学习，而是要培养孩子良好的学习习惯，让孩子自觉主动地进行学习。
