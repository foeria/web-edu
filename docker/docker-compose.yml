version: "3.8"

services:
  php:
    build:
      context: ..
      dockerfile: docker/php/Dockerfile
    container_name: web-edu-php
    volumes:
      - ../backend:/var/www/backend:ro
      - php-vendor:/var/www/backend/vendor
      - ../storage:/var/www/storage
    env_file:
      - ../.env
    networks:
      - web-edu

  nginx:
    build:
      context: ..
      dockerfile: docker/nginx/Dockerfile
    container_name: web-edu-nginx
    ports:
      - "80:80"
    volumes:
      - ../nuxt-app/.output/public:/usr/share/nginx/html:ro
      - ../storage:/var/www/storage:ro
      - ../docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - web-edu

networks:
  web-edu:
    driver: bridge

volumes:
  php-vendor:
